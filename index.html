<!doctype html>
<html>
  <head>
    <title>La Liga Rankings | Home</title>
    <meta name="description" content="La Liga Soccer Team Rankings" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">La Liga Rankings</h1>
    </header>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>Team Name</h2>
        <img src="" alt="Team Logo" />
        <ul>
          <li>Bullet Point 1</li>
          <li>Bullet Point 2</li>
          <li>Bullet Point 3</li>
          <li>Bullet Point 4</li>
          <li>Bullet Point 5</li>
        </ul>
      </div>
    </div>
    <div class="footer">
      <button onclick="sortBy()">Sort Teams!</button>
      <button onclick="removeLastCard()">Remove A Team!</button>
      <button onclick="addLastCard()">Add A Team!</button>
      <button onclick="searchTeam()">Search Team!</button>
      <button onclick="resetCards()">Reset Cards!</button>
    </div>
  </body>
</html>
